<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cric Bro</title>
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = { darkMode: "class" };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 transition-colors">

<div class="max-w-6xl mx-auto p-3 sm:p-4">
  <div class="flex items-center justify-between gap-2 mb-4">
    <h1 class="text-xl sm:text-2xl font-bold">🏏 Cric Bro</h1>
    <button onclick="clearAllData()"
      class="bg-red-600 text-white px-3 py-2 rounded text-sm whitespace-nowrap">
      Clear Data
    </button>
  </div>

  <div class="bg-gray-900 rounded-lg shadow p-3 sm:p-4 mb-4 border border-gray-800">
    <p class="font-semibold mb-2">Setup Teams (enter all teams first)</p>
    <div class="flex flex-col sm:flex-row gap-2">
      <input id="teamName" placeholder="Team Name"
        class="flex-1 p-2 border rounded bg-gray-950 border-gray-700"/>
      <button onclick="addTeam()" class="bg-blue-500 text-white px-4 py-2 rounded">Add Team</button>
    </div>
    <div class="flex flex-col sm:flex-row gap-2 mt-2">
      <input id="bulkTeams" placeholder="Or paste comma-separated teams (e.g. A, B, C)"
        class="flex-1 p-2 border rounded bg-gray-950 border-gray-700"/>
      <button onclick="addBulkTeams()" class="bg-sky-600 text-white px-4 py-2 rounded">Add All</button>
    </div>
    <p class="text-xs opacity-80 mt-2">Auto-syncs every 2 seconds and persists on this device unless cleared.</p>
  </div>

  <!-- Points Table -->
  <div id="pointsTable" class="mb-4"></div>

  <!-- Global Match Entry -->
  <div id="globalMatchPanel" class="mb-4"></div>

  <!-- Teams -->
  <div id="teamsContainer"></div>
</div>

<script>
let tournament = JSON.parse(localStorage.getItem("nrrApp")) || {
  formatOvers: 20,
  teams: []
};
let collapsedTeamIds = new Set(JSON.parse(localStorage.getItem("nrrCollapsedTeams") || "[]"));
let lastSyncedSnapshot = "";

function applyTheme() {
  document.documentElement.classList.add("dark");
}

function save() {
  localStorage.setItem("nrrApp", JSON.stringify(tournament));
  localStorage.setItem("nrrAppCookieBackup", JSON.stringify(tournament));
  lastSyncedSnapshot = JSON.stringify(tournament);
  render();
}

function syncEveryTwoSeconds() {
  const current = JSON.stringify(tournament);
  if (current !== lastSyncedSnapshot) {
    localStorage.setItem("nrrApp", current);
    localStorage.setItem("nrrAppCookieBackup", current);
    lastSyncedSnapshot = current;
  }

  const externalState = localStorage.getItem("nrrApp");
  if (externalState && externalState !== current) {
    try {
      tournament = JSON.parse(externalState);
      normalizeData();
      render();
      lastSyncedSnapshot = externalState;
    } catch (error) {
      // Ignore malformed external data and keep current state.
    }
  }
}

function clearAllData() {
  if (!confirm("Clear all Cric Bro data from this device?")) return;
  localStorage.removeItem("nrrApp");
  localStorage.removeItem("nrrAppCookieBackup");
  localStorage.removeItem("nrrCollapsedTeams");
  tournament = { formatOvers: 20, teams: [] };
  collapsedTeamIds = new Set();
  save();
}

function saveCollapsedState() {
  localStorage.setItem("nrrCollapsedTeams", JSON.stringify(Array.from(collapsedTeamIds)));
}

function normalizeData() {
  tournament.teams.forEach(team => {
    if (!Array.isArray(team.matches)) team.matches = [];
    team.matches = team.matches.map(match => ({
      ...match,
      id: match.id || Date.now() + Math.random(),
      opponentId: match.opponentId || null
    }));
  });
}

function toggleTeamCardCollapse(teamId) {
  if (collapsedTeamIds.has(teamId)) collapsedTeamIds.delete(teamId);
  else collapsedTeamIds.add(teamId);
  saveCollapsedState();
  render();
}

// -------- Utils --------
function oversToBalls(overs) {
  if (!overs) return 0;
  if (!overs.includes(".")) return parseInt(overs) * 6;
  const [o, b] = overs.split('.').map(Number);
  if (b > 5) return 0;
  return (o * 6) + b;
}

function ballsToOvers(balls) {
  return Math.floor(balls/6) + "." + (balls%6);
}

function parseRuns(value) {
  const parsed = Number.parseInt(value, 10);
  if (!Number.isFinite(parsed) || parsed < 0) return null;
  return parsed;
}

function getOpponents(teamId) {
  return tournament.teams.filter(t => t.id !== teamId);
}

function inferResult(runsScored, runsConceded, selectedResult) {
  if (selectedResult && selectedResult !== "auto") return selectedResult;
  if (runsScored > runsConceded) return "win";
  if (runsScored < runsConceded) return "loss";
  return "tie";
}

function getTeamTotals(team) {
  const maxBalls = tournament.formatOvers * 6;
  const totals = {
    runsScored: 0,
    runsConceded: 0,
    ballsFaced: 0,
    ballsBowled: 0
  };

  team.matches.forEach(match => {
    totals.runsScored += match.runsScored;
    totals.runsConceded += match.runsConceded;
    totals.ballsFaced += match.allOut ? maxBalls : match.ballsFaced;
    totals.ballsBowled += match.ballsBowled;
  });

  return totals;
}

// -------- NRR --------
function calculateNRR(team) {
  const totals = getTeamTotals(team);
  const rf = totals.runsScored;
  const ra = totals.runsConceded;
  const bf = totals.ballsFaced;
  const bb = totals.ballsBowled;

  if (!bf || !bb) return 0;

  return ((rf/(bf/6)) - (ra/(bb/6))).toFixed(3);
}

// -------- Points --------
function calculatePoints(team) {
  let wins = 0;
  let ties = 0;

  team.matches.forEach(m => {
    if (m.result === "win") wins++;
    if (m.result === "tie") ties++;
  });

  return {
    matches: team.matches.length,
    wins,
    ties,
    losses: team.matches.length - wins - ties,
    points: (wins * 2) + ties
  };
}

// -------- Team --------
function addTeam() {
  const name = document.getElementById("teamName").value.trim();
  if (!name) return;
  if (tournament.teams.some(t => t.name.toLowerCase() === name.toLowerCase())) return;

  tournament.teams.push({
    id: Date.now(),
    name,
    matches: []
  });

  document.getElementById("teamName").value = "";
  save();
}

function addBulkTeams() {
  const raw = document.getElementById("bulkTeams").value.trim();
  if (!raw) return;
  const names = raw.split(",").map(n => n.trim()).filter(Boolean);
  if (!names.length) return;

  names.forEach((name, idx) => {
    if (tournament.teams.some(t => t.name.toLowerCase() === name.toLowerCase())) return;
    tournament.teams.push({
      id: Date.now() + idx,
      name,
      matches: []
    });
  });

  document.getElementById("bulkTeams").value = "";
  save();
}

function deleteTeam(id) {
  tournament.teams = tournament.teams
    .filter(t => t.id !== id)
    .map(team => ({
      ...team,
      matches: team.matches.filter(m => m.opponentId !== id)
    }));
  save();
}

// -------- Match --------
function addMatchEntry(teamId, opponentId, rs, of, oppRuns, oppOvers, ao, oppAllOut, result) {
  const bf = oversToBalls(of);
  const bb = oversToBalls(oppOvers);
  const maxBalls = tournament.formatOvers * 6;
  const effectiveBf = ao ? maxBalls : bf;
  const effectiveBb = oppAllOut ? maxBalls : bb;
  const inferredResult = inferResult(rs, oppRuns, result);
  const oppResult = inferResult(oppRuns, rs, "auto");

  if (!opponentId || rs === null || oppRuns === null || (!effectiveBf) || (!effectiveBb)) {
    alert("Invalid input");
    return false;
  }

  const team = tournament.teams.find(t => t.id === teamId);
  const opponent = tournament.teams.find(t => t.id === opponentId);
  if (!team || !opponent) return false;
  if (teamId === opponentId) {
    alert("Team cannot play against itself.");
    return false;
  }
  const matchId = Date.now() + Math.random();

  team.matches.push({
    id: matchId,
    opponentId,
    runsScored: rs,
    ballsFaced: effectiveBf,
    runsConceded: oppRuns,
    ballsBowled: effectiveBb,
    allOut: ao,
    result: inferredResult
  });

  opponent.matches.push({
    id: matchId,
    opponentId: teamId,
    runsScored: oppRuns,
    ballsFaced: effectiveBb,
    runsConceded: rs,
    ballsBowled: effectiveBf,
    allOut: oppAllOut,
    result: oppResult
  });

  return true;
}

function addMatch(teamId) {
  const opponentId = Number.parseInt(document.getElementById(`opp-${teamId}`).value, 10);
  const rs = parseRuns(document.getElementById(`rs-${teamId}`).value);
  const of = document.getElementById(`of-${teamId}`).value;
  const oppRuns = parseRuns(document.getElementById(`or-${teamId}`).value);
  const oppOvers = document.getElementById(`oo-${teamId}`).value;
  const ao = document.getElementById(`ao-${teamId}`).checked;
  const oppAllOut = document.getElementById(`oao-${teamId}`).checked;
  const result = document.getElementById(`res-${teamId}`).value;

  const added = addMatchEntry(teamId, opponentId, rs, of, oppRuns, oppOvers, ao, oppAllOut, result);
  if (!added) return;
  save();
}

function updateGlobalOpponentOptions() {
  const teamId = Number.parseInt(document.getElementById("g-team").value, 10);
  const oppSelect = document.getElementById("g-opp");
  if (!oppSelect) return;

  const options = teamId
    ? getOpponents(teamId).map(o => `<option value="${o.id}">${o.name}</option>`).join("")
    : "";

  oppSelect.innerHTML = `<option value="">Select Team B</option>${options}`;
}

function addGlobalMatch() {
  const teamId = Number.parseInt(document.getElementById("g-team").value, 10);
  const opponentId = Number.parseInt(document.getElementById("g-opp").value, 10);
  const rs = parseRuns(document.getElementById("g-rs").value);
  const of = document.getElementById("g-of").value;
  const oppRuns = parseRuns(document.getElementById("g-or").value);
  const oppOvers = document.getElementById("g-oo").value;
  const ao = document.getElementById("g-ao").checked;
  const oppAllOut = document.getElementById("g-oao").checked;
  const result = document.getElementById("g-res").value;

  const added = addMatchEntry(teamId, opponentId, rs, of, oppRuns, oppOvers, ao, oppAllOut, result);
  if (!added) return;
  save();
}

function toggleNrrInfo(teamId) {
  const panel = document.getElementById(`nrr-info-${teamId}`);
  if (!panel) return;
  panel.classList.toggle("hidden");
}

// -------- Predictor --------
function predictNRR(teamId) {
  const team = tournament.teams.find(t => t.id === teamId);

  const rs = parseRuns(document.getElementById(`prs-${teamId}`).value);
  const of = oversToBalls(document.getElementById(`pof-${teamId}`).value);
  const rc = parseRuns(document.getElementById(`prc-${teamId}`).value);
  const ob = oversToBalls(document.getElementById(`pob-${teamId}`).value);
  const targetNrr = Number.parseFloat(document.getElementById(`ptn-${teamId}`).value);
  const predictionEl = document.getElementById(`pred-${teamId}`);
  const suggestionsEl = document.getElementById(`sugg-${teamId}`);

  if (rs === null || rc === null || !of || !ob) {
    predictionEl.innerText = "Enter valid projected runs and overs.";
    suggestionsEl.innerHTML = "";
    return;
  }

  const clone = JSON.parse(JSON.stringify(team));

  clone.matches.push({
    runsScored: rs,
    ballsFaced: of,
    runsConceded: rc,
    ballsBowled: ob,
    allOut: false
  });

  const newNRR = calculateNRR(clone);
  const inferredResult = inferResult(rs, rc, "auto");
  const teamTotals = getTeamTotals(team);

  predictionEl.innerText = `Projected NRR: ${newNRR} (${inferredResult.toUpperCase()})`;

  if (!Number.isFinite(targetNrr)) {
    suggestionsEl.innerHTML = "<p>Add target NRR to see intelligent suggestions.</p>";
    return;
  }

  const totalFacedAfter = teamTotals.ballsFaced + of;
  const totalBowledAfter = teamTotals.ballsBowled + ob;

  const minRunsToReachTarget = Math.ceil(
    (((totalFacedAfter / 6) * (targetNrr + (6 * (teamTotals.runsConceded + rc) / totalBowledAfter))) - teamTotals.runsScored)
  );

  const maxRunsConcedable = Math.floor(
    (((totalBowledAfter / 6) * ((6 * (teamTotals.runsScored + rs) / totalFacedAfter) - targetNrr)) - teamTotals.runsConceded)
  );

  suggestionsEl.innerHTML = `
    <p>Target NRR: <b>${targetNrr.toFixed(3)}</b></p>
    <p>Batting plan (with opp ${rc}): Score at least <b>${Math.max(0, minRunsToReachTarget)}</b> in ${ballsToOvers(of)} overs.</p>
    <p>Bowling plan (if you score ${rs}): Concede at most <b>${Math.max(0, maxRunsConcedable)}</b> in ${ballsToOvers(ob)} overs.</p>
  `;
}

// -------- Render --------
function renderGlobalMatchPanel() {
  const panel = document.getElementById("globalMatchPanel");
  const options = tournament.teams.map(t => `<option value="${t.id}">${t.name}</option>`).join("");

  panel.innerHTML = `
    <div class="bg-gray-900 rounded shadow p-3 sm:p-4 border border-gray-800">
      <p class="font-semibold mb-2">Add Match (Single Entry for Both Teams)</p>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
        <select id="g-team" onchange="updateGlobalOpponentOptions()" class="border p-2 rounded bg-gray-950 border-gray-700">
          <option value="">Select Team A</option>
          ${options}
        </select>
        <select id="g-opp" class="border p-2 rounded bg-gray-950 border-gray-700">
          <option value="">Select Team B</option>
        </select>
        <input id="g-rs" placeholder="Team A Runs" class="border p-2 rounded bg-gray-950 border-gray-700"/>
        <input id="g-of" placeholder="Team A Overs Faced" class="border p-2 rounded bg-gray-950 border-gray-700"/>
        <input id="g-or" placeholder="Team B Runs" class="border p-2 rounded bg-gray-950 border-gray-700"/>
        <input id="g-oo" placeholder="Team B Overs Faced" class="border p-2 rounded bg-gray-950 border-gray-700"/>
      </div>
      <select id="g-res" class="mt-2 border p-2 rounded w-full bg-gray-950 border-gray-700">
        <option value="auto">Auto (Infer Team A result)</option>
        <option value="win">Team A Win</option>
        <option value="loss">Team A Loss</option>
        <option value="tie">Tie</option>
      </select>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mt-1 text-sm">
        <label><input type="checkbox" id="g-ao"/> Team A all out</label>
        <label><input type="checkbox" id="g-oao"/> Team B all out</label>
      </div>
      <button onclick="addGlobalMatch()" class="bg-emerald-600 text-white w-full mt-2 p-2 rounded">
        Save Match for Both Teams
      </button>
    </div>
  `;
}

function render() {
  renderPointsTable();
  renderGlobalMatchPanel();

  const container = document.getElementById("teamsContainer");
  container.innerHTML = "";

  tournament.teams.forEach(team => {
    const nrr = calculateNRR(team);
    const pts = calculatePoints(team);
    const opponents = getOpponents(team.id);
    const totals = getTeamTotals(team);
    const forRate = totals.ballsFaced ? (totals.runsScored / (totals.ballsFaced / 6)).toFixed(3) : "0.000";
    const againstRate = totals.ballsBowled ? (totals.runsConceded / (totals.ballsBowled / 6)).toFixed(3) : "0.000";
    const isCollapsed = collapsedTeamIds.has(team.id);

    const div = document.createElement("div");
    div.className = "bg-gray-900 p-3 sm:p-4 mb-4 rounded shadow border border-gray-800";

    div.innerHTML = `
      <div class="flex items-start justify-between gap-2">
        <div>
          <h2 class="font-bold">${team.name}</h2>
          <p class="text-sm">Pts: ${pts.points} | W: ${pts.wins} | T: ${pts.ties} | L: ${pts.losses}</p>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="toggleTeamCardCollapse(${team.id})" class="text-xs px-2 py-1 rounded border border-gray-600">
            ${isCollapsed ? "Expand" : "Collapse"}
          </button>
          <button onclick="deleteTeam(${team.id})" class="text-red-500">Delete</button>
        </div>
      </div>

      <div class="flex items-center gap-2 mt-1 ${isCollapsed ? "" : ""}">
        <p class="${nrr>=0?'text-green-600':'text-red-600'}">NRR: ${nrr}</p>
        <button onclick="toggleNrrInfo(${team.id})" class="text-blue-500" title="How NRR is calculated">ℹ️</button>
      </div>
      <div class="${isCollapsed ? "hidden" : ""}">
        <div id="nrr-info-${team.id}" class="hidden text-sm mt-1 p-2 rounded bg-gray-800">
          <p>Total runs scored: <b>${totals.runsScored}</b> in <b>${ballsToOvers(totals.ballsFaced)}</b> overs (RR ${forRate})</p>
          <p>Total runs conceded: <b>${totals.runsConceded}</b> in <b>${ballsToOvers(totals.ballsBowled)}</b> overs (RR ${againstRate})</p>
        </div>

        <div class="text-sm mt-2 max-h-40 overflow-auto rounded border border-gray-700 px-2">
          ${team.matches.map(m=>`
            <div class="border-t border-gray-700 py-1">
              ${tournament.teams.find(t => t.id === m.opponentId)?.name || "Unknown"}:
              ${m.runsScored} (${ballsToOvers(m.ballsFaced)}) vs
              ${m.runsConceded} (${ballsToOvers(m.ballsBowled)}) - ${m.result.toUpperCase()}
            </div>
          `).join("")}
        </div>

        <!-- Predictor -->
        <details class="mt-3 border-t border-gray-700 pt-2">
          <summary class="cursor-pointer font-semibold">NRR Predictor (Enhanced)</summary>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mt-2">
            <input id="prs-${team.id}" placeholder="Your Runs" class="border p-2 rounded bg-gray-950 border-gray-700"/>
            <input id="pof-${team.id}" placeholder="Your Overs" class="border p-2 rounded bg-gray-950 border-gray-700"/>
            <input id="prc-${team.id}" placeholder="Opp Runs" class="border p-2 rounded bg-gray-950 border-gray-700"/>
            <input id="pob-${team.id}" placeholder="Opp Overs" class="border p-2 rounded bg-gray-950 border-gray-700"/>
            <input id="ptn-${team.id}" placeholder="Target NRR (optional)" class="border p-2 rounded sm:col-span-2 bg-gray-950 border-gray-700"/>
          </div>
          <button onclick="predictNRR(${team.id})"
            class="bg-purple-500 text-white w-full mt-2 p-2 rounded">
            Predict + Suggest
          </button>
          <p id="pred-${team.id}" class="mt-1 text-sm"></p>
          <div id="sugg-${team.id}" class="mt-1 text-sm space-y-1"></div>
        </details>
      </div>
    `;

    container.appendChild(div);
  });
}

// -------- Points Table UI --------
function renderPointsTable() {
  const div = document.getElementById("pointsTable");

  const rows = tournament.teams.map(t => {
    const pts = calculatePoints(t);
    return { name: t.name, ...pts, nrr: calculateNRR(t) };
  }).sort((a,b)=> b.points - a.points || b.nrr - a.nrr);

  div.innerHTML = `
    <div class="bg-gray-900 rounded shadow p-2 sm:p-3 border border-gray-800">
      <p class="font-semibold mb-2">Points Table</p>
      <div class="overflow-x-auto">
        <table class="w-full min-w-[520px] text-sm">
          <tr class="font-bold border-b border-gray-700">
            <td class="py-1 pr-2">Team</td><td class="py-1 pr-2">M</td><td class="py-1 pr-2">W</td><td class="py-1 pr-2">T</td><td class="py-1 pr-2">L</td><td class="py-1 pr-2">Pts</td><td class="py-1">NRR</td>
          </tr>
          ${rows.map(r=>`
            <tr class="border-b border-gray-700">
              <td class="py-1 pr-2">${r.name}</td>
              <td class="py-1 pr-2">${r.matches}</td>
              <td class="py-1 pr-2">${r.wins}</td>
              <td class="py-1 pr-2">${r.ties}</td>
              <td class="py-1 pr-2">${r.losses}</td>
              <td class="py-1 pr-2">${r.points}</td>
              <td class="py-1">${r.nrr}</td>
            </tr>
          `).join("")}
        </table>
      </div>
    </div>
  `;
}

normalizeData();
applyTheme();
setInterval(syncEveryTwoSeconds, 2000);
window.addEventListener("beforeunload", syncEveryTwoSeconds);
window.addEventListener("storage", event => {
  if (event.key === "nrrApp" && event.newValue) {
    try {
      tournament = JSON.parse(event.newValue);
      normalizeData();
      render();
      lastSyncedSnapshot = event.newValue;
    } catch (error) {
      // Ignore malformed shared storage data.
    }
  }
});
render();
</script>

</body>
</html>
